name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: "1.24.1"
  RUST_VERSION: "1.93.0"

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m
          install-mode: "module"

  rust-check:
    name: Rust Lint & Build (1.93.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

     
      - name: Install musl-gcc
        run: sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt, rust-src
          targets: x86_64-unknown-linux-musl

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cache-service
          cache-on-failure: true

      - name: Generate proto code first
        run: |
          cd cache-service
          cargo build --release

      - name: Run rustfmt
        working-directory: cache-service
        run: find . -name "*.rs" ! -path "./cache-service/src/proto/*" -exec rustfmt --check {} +

      - name: Run clippy
        working-directory: cache-service
        run: cargo clippy -- -D warnings

      - name: Build cache-service
        working-directory: cache-service
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: semantic-cache-musl
          path: cache-service/target/x86_64-unknown-linux-musl/release/semantic-cache

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Cross-Compile Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o bin/tiny-agent-router-linux-amd64 ./cmd/router
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o bin/tiny-agent-router-darwin-amd64 ./cmd/router
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o bin/tiny-agent-router-windows-am64.exe ./cmd/router
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  rust-build:
    name: Rust Cache-Service Release Build
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

  
      - name: Install musl-gcc
        run: sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cache-service

      - name: Build release binary (Linux musl)
        working-directory: cache-service
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v4
        with:
          name: cache-service-binary
          path: cache-service/target/x86_64-unknown-linux-musl/release/semantic-cache

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, rust-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max