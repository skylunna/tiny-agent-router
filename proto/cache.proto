syntax = "proto3";
package cache;
option go_package = "github.com/skylunna/tiny-agent-router/internal/cache/proto";

// 缓存请求：用 embedding 向量 + 元数据作为键
message CacheRequest {
  string request_id = 1;          // 唯一请求 ID（用于追踪）
  repeated float embedding = 2;   // 请求的语义向量（768/1024 维）
  string model = 3;               // 目标模型名（用于隔离缓存）
  string system_prompt_hash = 4;  // 系统提示哈希（避免提示变更导致缓存污染）
  int64 ttl_seconds = 5;          // 缓存有效期（秒），0 表示默认
}

// 缓存响应
message CacheResponse {
  bool hit = 1;                   // 是否命中
  optional string response_body = 2;  // 命中时返回缓存的完整响应（JSON 字符串）
  optional float similarity = 3;  // 相似度分数（0.0~1.0），用于可观测
  string reason = 4;              // 未命中原因： "miss"/"expired"/"threshold"
}

// 缓存服务定义
service SemanticCache {
  // 查询缓存：返回命中结果或空
  rpc Get(CacheRequest) returns (CacheResponse);
  
  // 写入缓存：异步调用，不阻塞主请求
  rpc Put(CacheRequest) returns (Empty);
  
  // 健康检查
  rpc Health(Empty) returns (HealthResponse);
}

message Empty {}
message HealthResponse { bool serving = 1; }